version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vendas-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vendasdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d vendasdb" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vendas-backend
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/vendasdb?schema=public
      - JWT_SECRET=super_secret_jwt_key_2024
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vendas-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
